name: Acceptance Tests

# Manual-only. Tests hit live Base Sepolia via the testnet API.
# Trigger after merging SDK changes to verify all payment flows work end-to-end.
# FULLY SEQUENTIAL: one SDK at a time to avoid relayer nonce contention.
# The server uses a single relayer EOA — concurrent SDK runs cause nonce conflicts.
# Order chosen to minimize rate-limiting: Swift (macOS, slow setup) runs early.
# Rust SKIPPED: SDK permit signing is broken (all on-chain flows revert with InsufficientAllowance).
on:
  workflow_dispatch:
    inputs:
      sdk:
        description: "Which SDK to test"
        required: true
        type: choice
        options:
          - all
          - typescript
          - python
          - go
          - java
          - ruby
          - swift
          - dotnet
          - elixir
        default: all

permissions:
  contents: read

jobs:
  # ── 1. Python ───────────────────────────────────────────────────────────────
  python:
    name: Python SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'python'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd python && pip install -e ".[dev]"

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://testnet.remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: cd python && python -m pytest tests/acceptance/ -v -s --timeout=180

  # ── 2. TypeScript (after Python) ────────────────────────────────────────────
  typescript:
    name: TS SDK Acceptance
    needs: [python]
    if: ${{ !cancelled() && (inputs.sdk == 'all' || inputs.sdk == 'typescript') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: typescript

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          version: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: 'pnpm'
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://testnet.remit.md/api/v1
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: pnpm run acceptance

  # ── 3. Swift (after TS, early to avoid rate limiting from later SDKs) ───────
  swift:
    name: Swift SDK Acceptance
    needs: [typescript]
    if: ${{ !cancelled() && (inputs.sdk == 'all' || inputs.sdk == 'swift') }}
    runs-on: macos-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: swift

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://testnet.remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: swift test --filter AcceptanceTests

  # ── 4. Go (after Swift) ────────────────────────────────────────────────────
  go:
    name: Go SDK Acceptance
    needs: [swift]
    if: ${{ !cancelled() && (inputs.sdk == 'all' || inputs.sdk == 'go') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"
          cache-dependency-path: go/go.sum

      - name: Tidy modules
        run: cd go && go mod tidy

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://testnet.remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: cd go && go test -tags acceptance -timeout 600s -v -count=1

  # ── 5. Java (after Go) ─────────────────────────────────────────────────────
  java:
    name: Java SDK Acceptance
    needs: [go]
    if: ${{ !cancelled() && (inputs.sdk == 'all' || inputs.sdk == 'java') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: java

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          gradle-version: "8.7"

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://testnet.remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: gradle acceptanceTest --no-daemon

  # ── 6. Ruby (after Java) ────────────────────────────────────────────────────
  ruby:
    name: Ruby SDK Acceptance
    needs: [java]
    if: ${{ !cancelled() && (inputs.sdk == 'all' || inputs.sdk == 'ruby') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ruby

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@32110d4e311bd8996b2a82bf2a43b714ccc91777 # v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ruby

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://testnet.remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: bundle exec rspec spec/acceptance_spec.rb --tag acceptance -f documentation

  # ── 7. .NET (after Ruby) ────────────────────────────────────────────────────
  dotnet:
    name: .NET SDK Acceptance
    needs: [ruby]
    if: ${{ !cancelled() && (inputs.sdk == 'all' || inputs.sdk == 'dotnet') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: dotnet

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "8.0"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://testnet.remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: dotnet test --no-build -c Release --filter "Category=Acceptance" --verbosity normal

  # ── 8. Elixir (after .NET) ─────────────────────────────────────────────────
  elixir:
    name: Elixir SDK Acceptance
    needs: [dotnet]
    if: ${{ !cancelled() && (inputs.sdk == 'all' || inputs.sdk == 'elixir') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Elixir
        uses: erlef/setup-beam@0a75ccf1c18916f948584bdc83392d72e26f58f7 # v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - name: Install dependencies
        run: mix deps.get

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://testnet.remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: mix test test/acceptance_test.exs --include acceptance

  # ── Rust SKIPPED ────────────────────────────────────────────────────────────
  # Rust SDK permit signing is broken — all on-chain flows revert with
  # InsufficientAllowance. Needs SDK-level fix before acceptance tests can run.
  # Re-enable after fixing rust/src/wallet.rs permit signing.
