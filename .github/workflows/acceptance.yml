name: Acceptance Tests

# Manual-only. Tests hit live Base Sepolia via the production API.
# Trigger after merging SDK changes to verify all payment flows work end-to-end.
on:
  workflow_dispatch:
    inputs:
      sdk:
        description: "Which SDK to test"
        required: true
        type: choice
        options:
          - all
          - typescript
          - python
          - go
          - rust
          - java
          - ruby
          - swift
          - dotnet
          - elixir
        default: all

permissions:
  contents: read

jobs:
  typescript:
    name: TS SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'typescript'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://remit.md/api/v1
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: pnpm run acceptance

  python:
    name: Python SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'python'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd python && pip install -e ".[dev]"

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: cd python && python -m pytest tests/acceptance/ -v -s --timeout=180

  go:
    name: Go SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'go'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go/go.sum

      - name: Tidy modules
        run: cd go && go mod tidy

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: cd go && go test -tags acceptance -timeout 600s -v -count=1

  rust:
    name: Rust SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'rust'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: cd rust && cargo test --test acceptance -- --include-ignored --nocapture

  java:
    name: Java SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'java'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: java

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: gradle acceptanceTest --no-daemon

  ruby:
    name: Ruby SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'ruby'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ruby

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ruby

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: bundle exec rspec spec/acceptance_spec.rb --tag acceptance -f documentation

  swift:
    name: Swift SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'swift'
    runs-on: macos-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: swift

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: swift test --filter AcceptanceTests

  dotnet:
    name: .NET SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'dotnet'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: dotnet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: dotnet test --no-build -c Release --filter "Category=Acceptance" --verbosity normal

  elixir:
    name: Elixir SDK Acceptance
    if: inputs.sdk == 'all' || inputs.sdk == 'elixir'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - name: Install dependencies
        run: mix deps.get

      - name: Run acceptance tests
        env:
          ACCEPTANCE_API_URL: https://remit.md
          ACCEPTANCE_RPC_URL: https://sepolia.base.org
        run: mix test test/acceptance_test.exs --include acceptance
