name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: SDK Python
    runs-on: [self-hosted, linux, x64]
    # Python 3.12 + pip are pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: cd python && pip install -e ".[dev]"
      - name: Lint
        run: cd python && ruff check .
      - name: Format check
        run: cd python && ruff format --check .
      - name: Type check
        run: cd python && mypy src/
      # Coverage gate: target 50% (MASTER.md); initial gate 35% (compliance tests server-gated).
      - name: Test with coverage gate
        run: cd python && pytest -v --cov=remitmd --cov-fail-under=35 --cov-report=term-missing

  typescript:
    name: SDK TypeScript
    runs-on: [self-hosted, linux, x64]
    # Node.js 20 + pnpm are pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: cd typescript && pnpm install --frozen-lockfile
      - name: Typecheck
        run: cd typescript && pnpm tsc --noEmit
      - name: Build
        run: cd typescript && pnpm tsc
      # Coverage gate: target 50% (MASTER.md); initial gate 35% (compliance tests server-gated).
      - name: Test with coverage gate
        run: cd typescript && pnpm dlx c8@10 --reporter=text --lines 35 --branches 35 --functions 35 node --import ./node_modules/tsx/dist/esm/index.cjs --test tests/*.ts

  go:
    name: SDK Go
    runs-on: [self-hosted, linux, x64]
    # Go 1.22 is pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4
      - name: Tidy modules
        run: cd go && go mod tidy
      - name: Vet
        run: cd go && go vet ./...
      # Coverage gate: target 50% (MASTER.md); measured baseline: 33%. Gate: 30%.
      - name: Test with coverage gate
        working-directory: go
        run: |
          go test -coverprofile=coverage.out ./... -v -count=1
          go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,"",$3); pct=$3+0; printf "Total coverage: %.1f%%\n", pct; if (pct < 30) {print "ERROR: coverage " pct "% below 30% threshold"; exit 1}}'

  rust:
    name: SDK Rust
    runs-on: [self-hosted, linux, x64]
    # Rust stable + clippy + rustfmt + cargo-llvm-cov are pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4
      - name: Format check
        run: cd rust && cargo fmt --check
      - name: Clippy
        run: cd rust && cargo clippy -- -D warnings
      # Coverage gate: target 50% (MASTER.md); initial gate 35% (compliance tests server-gated).
      - name: Test with coverage gate
        run: cd rust && cargo llvm-cov --fail-under-lines 35

  dotnet:
    name: SDK .NET
    runs-on: [self-hosted, linux, x64]
    # .NET 8.0 SDK is pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4
      - name: Restore
        run: cd dotnet && dotnet restore
      - name: Build
        run: cd dotnet && dotnet build --no-restore -c Release
      # Coverage gate: target 50% (MASTER.md); initial gate 35% (compliance tests server-gated).
      # /p:Threshold=35 fails the test run if line coverage drops below 35%.
      - name: Test with coverage gate
        run: cd dotnet && dotnet test --no-build -c Release --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:Threshold=35 /p:ThresholdType=Line

  java:
    name: SDK Java/Kotlin
    runs-on: [self-hosted, linux, x64]
    # Java 17 Temurin + Gradle are pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4
      # Coverage gate: target 50% (MASTER.md); initial gate 35% (compliance tests server-gated).
      # jacocoTestCoverageVerification fails the build if line coverage < 35%.
      # Single build+test step avoids double compilation.
      - name: Build + Test with coverage gate
        run: cd java && gradle build test jacocoTestReport jacocoTestCoverageVerification --no-daemon

  ruby:
    name: SDK Ruby
    runs-on: [self-hosted, linux, x64]
    # Ruby 3.2 + bundler are pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: cd ruby && bundle install
      - name: RuboCop
        run: cd ruby && bundle exec rubocop -A --no-color && bundle exec rubocop --no-color
      # Coverage gate: target 50% (MASTER.md); initial gate 35% via SimpleCov in spec_helper.rb.
      # SimpleCov minimum_coverage is enforced only when CI=true (set by GitHub Actions).
      - name: Test with coverage gate
        run: cd ruby && bundle exec rspec

  swift:
    name: SDK Swift
    runs-on: macos-latest
    # macOS runners are Swift-only across SDK workflows (10× cost). See CI Cost Policy.
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cd swift && swift build
      # Coverage gate: target 50% (MASTER.md); initial gate 35%.
      - name: Test with coverage gate
        run: |
          cd swift && swift test --enable-code-coverage
          XCTEST=$(find .build/debug -name "*.xctest" -not -path "*/Contents/*" 2>/dev/null | head -1)
          if [ -n "$XCTEST" ]; then
            NAME=$(basename "$XCTEST" .xctest)
            BINARY="$XCTEST/Contents/MacOS/$NAME"
            PROFDATA=".build/debug/codecov/default.profdata"
            TOTAL=$(xcrun llvm-cov report "$BINARY" -instr-profile="$PROFDATA" --sources Sources/ 2>/dev/null | grep "^TOTAL" | awk '{gsub(/%/,""); print $4}')
            echo "Total coverage: ${TOTAL:-0}%"
            awk "BEGIN { pct=${TOTAL:-0}+0; if (pct < 35) { printf \"ERROR: coverage %.1f%% below 35%%\n\", pct; exit 1 } }"
          else
            echo "WARNING: xctest binary not found, skipping coverage check"
          fi

  elixir:
    name: SDK Elixir
    runs-on: [self-hosted, linux, x64]
    # Erlang/OTP 26 + Elixir 1.16 are pre-installed on the self-hosted runner.
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: cd elixir && mix deps.get
      - name: Compile
        run: cd elixir && mix compile --warnings-as-errors
      # Coverage gate: target 50% (MASTER.md); initial gate 35% via .coveralls.json minimum_coverage.
      # mix coveralls exits non-zero if coverage < minimum_coverage in .coveralls.json.
      - name: Test with coverage gate
        run: cd elixir && mix coveralls
