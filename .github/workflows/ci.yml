name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: SDK Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: cd python && pip install -e ".[dev]"
      - name: Lint
        run: cd python && ruff check .
      - name: Format check
        run: cd python && ruff format --check .
      - name: Type check
        run: cd python && mypy src/
      # Coverage gate: target 50% (MASTER.md); gate 40% (compliance tests server-gated).
      # Exclude acceptance tests (live Base Sepolia) — they have their own manual workflow.
      - name: Test with coverage gate
        run: cd python && pytest -v --cov=remitmd --cov-fail-under=40 --cov-report=term-missing --ignore=tests/acceptance --ignore=tests/compliance

  typescript:
    name: SDK TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          version: 'latest'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Install
        run: cd typescript && pnpm install --frozen-lockfile
      - name: Typecheck
        run: cd typescript && pnpm tsc --noEmit
      - name: Build
        run: cd typescript && pnpm tsc
      # Coverage gate: target 50% (MASTER.md); gate 40% (compliance tests server-gated).
      - name: Test with coverage gate
        run: cd typescript && pnpm dlx c8@10 --reporter=text --lines 40 --branches 40 --functions 40 node --import ./node_modules/tsx/dist/esm/index.cjs --test tests/*.ts

  go:
    name: SDK Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      - name: Tidy modules
        run: cd go && go mod tidy
      - name: Vet
        run: cd go && go vet ./...
      # Coverage gate: target 50% (MASTER.md); gate: 40%.
      - name: Test with coverage gate
        working-directory: go
        run: |
          go test -coverprofile=coverage.out ./... -v -count=1
          go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,"",$3); pct=$3+0; printf "Total coverage: %.1f%%\n", pct; if (pct < 40) {print "ERROR: coverage " pct "% below 40% threshold"; exit 1}}'

  rust:
    name: SDK Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust
      - uses: taiki-e/install-action@0d865d5cc6d507df4765f1f866bfae8bab4e2a73 # v2
        with:
          tool: cargo-llvm-cov
      - name: Format check
        run: cd rust && cargo fmt --check
      - name: Clippy
        run: cd rust && cargo clippy -- -D warnings
      # Coverage gate: target 50% (MASTER.md); gate 40% (compliance tests server-gated).
      - name: Test with coverage gate
        run: cd rust && cargo llvm-cov --fail-under-lines 40

  dotnet:
    name: SDK .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.x'
      - name: Restore
        run: cd dotnet && dotnet restore
      - name: Build
        run: cd dotnet && dotnet build --no-restore -c Release
      # Coverage gate: target 50% (MASTER.md); gate 40% (compliance tests server-gated).
      # /p:Threshold=40 fails the test run if line coverage drops below 40%.
      - name: Test with coverage gate
        run: cd dotnet && dotnet test --no-build -c Release --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:Threshold=40 /p:ThresholdType=Line

  java:
    name: SDK Java/Kotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          gradle-version: '8.7'
      # Coverage gate: target 50% (MASTER.md); gate 40% (compliance tests server-gated).
      # jacocoTestCoverageVerification fails the build if line coverage < 40%.
      # Single build+test step avoids double compilation.
      - name: Build + Test with coverage gate
        run: cd java && gradle build test jacocoTestReport jacocoTestCoverageVerification --no-daemon

  ruby:
    name: SDK Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ruby/setup-ruby@32110d4e311bd8996b2a82bf2a43b714ccc91777 # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ruby
      - name: RuboCop
        run: cd ruby && bundle exec rubocop -A --no-color && bundle exec rubocop --no-color
      # Coverage gate: target 50% (MASTER.md); gate 40% via SimpleCov in spec_helper.rb.
      # SimpleCov minimum_coverage is enforced only when CI=true (set by GitHub Actions).
      # Exclude acceptance tests (live Base Sepolia) — they have their own manual workflow.
      - name: Test with coverage gate
        run: cd ruby && bundle exec rspec --exclude-pattern "**/acceptance_spec.rb"

  swift:
    name: SDK Swift
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build
        run: cd swift && swift build
      # Coverage gate: target 50% (MASTER.md); gate 40%.
      - name: Test with coverage gate
        run: |
          cd swift && swift test --enable-code-coverage
          XCTEST=$(find .build/debug -name "*.xctest" -not -path "*/Contents/*" 2>/dev/null | head -1)
          if [ -n "$XCTEST" ]; then
            NAME=$(basename "$XCTEST" .xctest)
            BINARY="$XCTEST/Contents/MacOS/$NAME"
            PROFDATA=".build/debug/codecov/default.profdata"
            TOTAL=$(xcrun llvm-cov report "$BINARY" -instr-profile="$PROFDATA" --sources Sources/ 2>/dev/null | grep "^TOTAL" | awk '{gsub(/%/,""); print $4}')
            echo "Total coverage: ${TOTAL:-0}%"
            awk "BEGIN { pct=${TOTAL:-0}+0; if (pct < 40) { printf \"ERROR: coverage %.1f%% below 40%%\n\", pct; exit 1 } }"
          else
            echo "WARNING: xctest binary not found, skipping coverage check"
          fi

  elixir:
    name: SDK Elixir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: erlef/setup-beam@0a75ccf1c18916f948584bdc83392d72e26f58f7 # v1
        with:
          elixir-version: '1.17'
          otp-version: '27'
      - name: Install dependencies
        run: cd elixir && mix deps.get
      - name: Compile
        run: cd elixir && mix compile --warnings-as-errors
      # Coverage gate: target 50% (MASTER.md); gate 40% via .coveralls.json minimum_coverage.
      # mix coveralls exits non-zero if coverage < minimum_coverage in .coveralls.json.
      - name: Test with coverage gate
        run: cd elixir && mix coveralls
