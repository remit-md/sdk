name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: SDK Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: cd python && pip install -e ".[dev]"
      - name: Lint
        run: cd python && ruff check .
      - name: Format check
        run: cd python && ruff format --check .
      - name: Type check
        run: cd python && mypy src/
      - name: Test
        run: cd python && pytest -v

  typescript:
    name: SDK TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Install
        run: cd typescript && pnpm install --frozen-lockfile
      - name: Typecheck
        run: cd typescript && pnpm tsc --noEmit
      - name: Build
        run: cd typescript && pnpm tsc

  go:
    name: SDK Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Tidy modules
        run: cd go && go mod tidy
      - name: Vet
        run: cd go && go vet ./...
      - name: Test
        run: cd go && go test ./... -v -count=1

  rust:
    name: SDK Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Format check
        run: cd rust && cargo fmt --check
      - name: Clippy
        run: cd rust && cargo clippy -- -D warnings
      - name: Test
        run: cd rust && cargo test

  dotnet:
    name: SDK .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: cd dotnet && dotnet restore
      - name: Build
        run: cd dotnet && dotnet build --no-restore -c Release
      - name: Test
        run: cd dotnet && dotnet test --no-build -c Release --verbosity normal

  java:
    name: SDK Java/Kotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build
        run: cd java && gradle build --no-daemon
      - name: Test
        run: cd java && gradle test --no-daemon

  ruby:
    name: SDK Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ruby
      - name: RuboCop
        run: cd ruby && bundle exec rubocop -A --no-color && bundle exec rubocop --no-color
      - name: RSpec
        run: cd ruby && bundle exec rspec

  swift:
    name: SDK Swift
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cd swift && swift build
      - name: Test
        run: cd swift && swift test

  elixir:
    name: SDK Elixir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"
      - name: Install dependencies
        run: cd elixir && mix deps.get
      - name: Compile
        run: cd elixir && mix compile --warnings-as-errors
      - name: Test
        run: cd elixir && mix test
