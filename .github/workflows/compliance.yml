name: SDK Compliance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger (e.g., after a server image update)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-compliance:
    name: Python Compliance (real server)
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      packages: read   # required to pull ghcr.io/remit-md/server from private registry

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start compliance test harness
        run: |
          docker compose -f docker-compose.compliance.yml up -d
          echo "Waiting for server to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.compliance.yml ps server \
              | grep -q "(healthy)"; do
              sleep 3
            done
          '
          echo "Server is healthy"
          curl -sf http://localhost:3000/health | python3 -m json.tool

      - name: Install Python SDK
        run: cd python && pip install -e ".[dev]"

      - name: Run Python compliance tests
        env:
          REMIT_TEST_SERVER_URL: http://localhost:3000
          REMIT_ROUTER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
          REMIT_CHAIN_ID: "84532"
        run: cd python && pytest tests/compliance/ -v -s --tb=short

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f docker-compose.compliance.yml logs server 2>&1 | tail -200

      - name: Tear down compliance harness
        if: always()
        run: docker compose -f docker-compose.compliance.yml down -v

