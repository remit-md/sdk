name: SDK Compliance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger (e.g., after a server image update)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-compliance:
    name: Python Compliance (real server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # required to pull ghcr.io/remit-md/server from private registry

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start compliance test harness
        run: |
          docker compose -f docker-compose.compliance.yml up -d
          echo "Waiting for server to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.compliance.yml ps server \
              | grep -q "(healthy)"; do
              sleep 3
            done
          '
          echo "Server is healthy"
          curl -sf http://localhost:3000/health | python3 -m json.tool

      - name: Install Python SDK
        run: cd python && pip install -e ".[dev]"

      - name: Run Python compliance tests
        env:
          REMIT_TEST_SERVER_URL: http://localhost:3000
          REMIT_ROUTER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
          REMIT_CHAIN_ID: "84532"
        run: cd python && pytest tests/compliance/ -v -s --tb=short

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f docker-compose.compliance.yml logs server 2>&1 | tail -200

      - name: Tear down compliance harness
        if: always()
        run: docker compose -f docker-compose.compliance.yml down -v

  typescript-compliance:
    name: TypeScript Compliance (real server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start compliance test harness
        run: |
          docker compose -f docker-compose.compliance.yml up -d
          echo "Waiting for server to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.compliance.yml ps server \
              | grep -q "(healthy)"; do
              sleep 3
            done
          '
          echo "Server is healthy"
          curl -sf http://localhost:3000/health | python3 -m json.tool

      - name: Install TypeScript SDK dependencies
        run: cd typescript && pnpm install

      - name: Run TypeScript compliance tests
        env:
          REMIT_TEST_SERVER_URL: http://localhost:3000
          REMIT_ROUTER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
          REMIT_CHAIN_ID: "84532"
        run: cd typescript && pnpm run compliance

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f docker-compose.compliance.yml logs server 2>&1 | tail -200

      - name: Tear down compliance harness
        if: always()
        run: docker compose -f docker-compose.compliance.yml down -v

  go-compliance:
    name: Go Compliance (real server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start compliance test harness
        run: |
          docker compose -f docker-compose.compliance.yml up -d
          echo "Waiting for server to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.compliance.yml ps server \
              | grep -q "(healthy)"; do
              sleep 3
            done
          '
          echo "Server is healthy"
          curl -sf http://localhost:3000/health | python3 -m json.tool

      - name: Tidy Go dependencies
        run: cd go && go mod tidy

      - name: Run Go compliance tests
        env:
          REMIT_TEST_SERVER_URL: http://localhost:3000
          REMIT_ROUTER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
          REMIT_CHAIN_ID: "84532"
        run: cd go && go test -v -run TestCompliance -timeout 120s ./...

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f docker-compose.compliance.yml logs server 2>&1 | tail -200

      - name: Tear down compliance harness
        if: always()
        run: docker compose -f docker-compose.compliance.yml down -v

  java-compliance:
    name: Java Compliance (real server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start compliance test harness
        run: |
          docker compose -f docker-compose.compliance.yml up -d
          echo "Waiting for server to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.compliance.yml ps server \
              | grep -q "(healthy)"; do
              sleep 3
            done
          '
          echo "Server is healthy"
          curl -sf http://localhost:3000/health | python3 -m json.tool

      - name: Run Java compliance tests
        env:
          REMIT_TEST_SERVER_URL: http://localhost:3000
          REMIT_ROUTER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
        run: cd java && gradle test --no-daemon --tests "md.remit.ComplianceTest"

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f docker-compose.compliance.yml logs server 2>&1 | tail -200

      - name: Tear down compliance harness
        if: always()
        run: docker compose -f docker-compose.compliance.yml down -v

  ruby-compliance:
    name: Ruby Compliance (real server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ruby

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start compliance test harness
        run: |
          docker compose -f docker-compose.compliance.yml up -d
          echo "Waiting for server to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.compliance.yml ps server \
              | grep -q "(healthy)"; do
              sleep 3
            done
          '
          echo "Server is healthy"
          curl -sf http://localhost:3000/health | python3 -m json.tool

      - name: Run Ruby compliance tests
        env:
          REMIT_TEST_SERVER_URL: http://localhost:3000
          REMIT_ROUTER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
        run: cd ruby && bundle exec rspec spec/compliance_spec.rb --format documentation

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f docker-compose.compliance.yml logs server 2>&1 | tail -200

      - name: Tear down compliance harness
        if: always()
        run: docker compose -f docker-compose.compliance.yml down -v

  rust-compliance:
    name: Rust Compliance (real server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start compliance test harness
        run: |
          docker compose -f docker-compose.compliance.yml up -d
          echo "Waiting for server to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.compliance.yml ps server \
              | grep -q "(healthy)"; do
              sleep 3
            done
          '
          echo "Server is healthy"
          curl -sf http://localhost:3000/health | python3 -m json.tool

      - name: Run Rust compliance tests
        env:
          REMIT_TEST_SERVER_URL: http://localhost:3000
          REMIT_ROUTER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
        run: cd rust && cargo test compliance -- --include-ignored

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f docker-compose.compliance.yml logs server 2>&1 | tail -200

      - name: Tear down compliance harness
        if: always()
        run: docker compose -f docker-compose.compliance.yml down -v

  dotnet-compliance:
    name: .NET Compliance (real server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start compliance test harness
        run: |
          docker compose -f docker-compose.compliance.yml up -d
          echo "Waiting for server to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.compliance.yml ps server \
              | grep -q "(healthy)"; do
              sleep 3
            done
          '
          echo "Server is healthy"
          curl -sf http://localhost:3000/health | python3 -m json.tool

      - name: Restore and build
        run: cd dotnet && dotnet restore && dotnet build --no-restore -c Release

      - name: Run .NET compliance tests
        env:
          REMIT_TEST_SERVER_URL: http://localhost:3000
          REMIT_ROUTER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
        run: cd dotnet && dotnet test --no-build -c Release --verbosity normal --filter "FullyQualifiedName~ComplianceTests"

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f docker-compose.compliance.yml logs server 2>&1 | tail -200

      - name: Tear down compliance harness
        if: always()
        run: docker compose -f docker-compose.compliance.yml down -v

  elixir-compliance:
    name: Elixir Compliance (real server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start compliance test harness
        run: |
          docker compose -f docker-compose.compliance.yml up -d
          echo "Waiting for server to be healthy..."
          timeout 120 bash -c '
            until docker compose -f docker-compose.compliance.yml ps server \
              | grep -q "(healthy)"; do
              sleep 3
            done
          '
          echo "Server is healthy"
          curl -sf http://localhost:3000/health | python3 -m json.tool

      - name: Install Elixir dependencies
        run: cd elixir && mix deps.get

      - name: Run Elixir compliance tests
        env:
          REMIT_TEST_SERVER_URL: http://localhost:3000
          REMIT_ROUTER_ADDRESS: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
        run: cd elixir && mix test test/compliance_test.exs --trace

      - name: Dump server logs on failure
        if: failure()
        run: docker compose -f docker-compose.compliance.yml logs server 2>&1 | tail -200

      - name: Tear down compliance harness
        if: always()
        run: docker compose -f docker-compose.compliance.yml down -v
