name: Cross-SDK Golden Vectors

# Every SDK must reproduce identical EIP-712 hashes from test-vectors/eip712.json.
# This workflow runs only the vector tests - no mocks, no integration - so a
# single mismatch is immediately obvious without wading through unrelated failures.
#
# Rule: ALL jobs must be green. Any failure blocks the SDK repo.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  vectors-python:
    name: Vectors · Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install
        run: cd python && pip install -e ".[dev]"
      - name: Golden vectors
        run: cd python && pytest tests/test_golden_vectors.py -v

  vectors-typescript:
    name: Vectors · TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          version: 'latest'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Install
        run: cd typescript && pnpm install --frozen-lockfile
      - name: Golden vectors
        run: cd typescript && node --import tsx --test tests/test_golden_vectors.ts

  vectors-go:
    name: Vectors · Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      - name: Tidy
        run: cd go && go mod tidy
      - name: Golden vectors
        run: cd go && go test ./... -run "TestGoldenVectors" -v -count=1

  vectors-rust:
    name: Vectors · Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust
      - name: Golden vectors
        run: cd rust && cargo test golden_vectors -- --nocapture

  vectors-dotnet:
    name: Vectors · .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.x'
      - name: Restore
        run: cd dotnet && dotnet restore
      - name: Build
        run: cd dotnet && dotnet build --no-restore -c Release
      - name: Golden vectors
        run: cd dotnet && dotnet test --no-build -c Release --filter "FullyQualifiedName~GoldenVector" --verbosity normal

  vectors-java:
    name: Vectors · Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          gradle-version: '8.7'
      - name: Golden vectors
        run: cd java && gradle test --tests "md.remit.GoldenVectorTest" --no-daemon

  vectors-ruby:
    name: Vectors · Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ruby/setup-ruby@32110d4e311bd8996b2a82bf2a43b714ccc91777 # v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ruby
      - name: Golden vectors
        run: cd ruby && bundle exec rspec spec/golden_vectors_spec.rb

  vectors-swift:
    name: Vectors · Swift
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build
        run: cd swift && swift build
      - name: Golden vectors
        run: cd swift && swift test --filter EIP712VectorTests

  vectors-elixir:
    name: Vectors · Elixir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: erlef/setup-beam@0a75ccf1c18916f948584bdc83392d72e26f58f7 # v1
        with:
          elixir-version: '1.16'
          otp-version: '26'
      - name: Install deps
        run: cd elixir && mix deps.get
      - name: Compile
        run: cd elixir && mix compile --warnings-as-errors
      - name: Golden vectors
        run: cd elixir && mix test test/eip712_vector_test.exs
