name: Cross-SDK Golden Vectors

# Every SDK must reproduce identical EIP-712 hashes from test-vectors/eip712.json.
# This workflow runs only the vector tests — no mocks, no integration — so a
# single mismatch is immediately obvious without wading through unrelated failures.
#
# Rule: ALL jobs must be green. Any failure blocks the SDK repo.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  vectors-python:
    name: Vectors · Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install
        run: cd python && pip install -e ".[dev]"
      - name: Golden vectors
        run: cd python && pytest tests/test_golden_vectors.py -v

  vectors-typescript:
    name: Vectors · TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Install
        run: cd typescript && pnpm install --frozen-lockfile
      - name: Golden vectors
        run: cd typescript && node --import tsx --test tests/test_golden_vectors.ts

  vectors-go:
    name: Vectors · Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Tidy
        run: cd go && go mod tidy
      - name: Golden vectors
        run: cd go && go test ./... -run "TestGoldenVectors" -v -count=1

  vectors-rust:
    name: Vectors · Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Golden vectors
        run: cd rust && cargo test golden_vectors -- --nocapture

  vectors-dotnet:
    name: Vectors · .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: cd dotnet && dotnet restore
      - name: Build
        run: cd dotnet && dotnet build --no-restore -c Release
      - name: Golden vectors
        run: cd dotnet && dotnet test --no-build -c Release --filter "FullyQualifiedName~GoldenVector" --verbosity normal

  vectors-java:
    name: Vectors · Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v3
      - name: Golden vectors
        run: cd java && gradle test --tests "md.remit.GoldenVectorTest" --no-daemon

  vectors-ruby:
    name: Vectors · Ruby
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ruby
      - name: Golden vectors
        run: cd ruby && bundle exec rspec spec/golden_vectors_spec.rb

  vectors-swift:
    name: Vectors · Swift
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cd swift && swift build
      - name: Golden vectors
        run: cd swift && swift test --filter EIP712VectorTests

  vectors-elixir:
    name: Vectors · Elixir
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"
      - name: Install deps
        run: cd elixir && mix deps.get
      - name: Compile
        run: cd elixir && mix compile --warnings-as-errors
      - name: Golden vectors
        run: cd elixir && mix test test/eip712_vector_test.exs
