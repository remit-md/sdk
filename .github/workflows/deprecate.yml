name: Deprecate All Registries

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # PyPI OIDC

concurrency:
  group: deprecate
  cancel-in-progress: false

jobs:
  deprecate-pypi:
    name: Publish deprecation to PyPI (remitmd 0.4.1)
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build deprecation release
        working-directory: python
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  deprecate-crates:
    name: Publish deprecation to crates.io (remitmd 0.4.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish deprecation version
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        working-directory: rust
        run: |
          # Update version to 0.4.1
          sed -i 's/^version = "0.4.0"/version = "0.4.1"/' Cargo.toml
          cargo publish --allow-dirty 2>&1 || echo "Publish failed (may already exist)"

  deprecate-rubygems:
    name: Publish deprecation to RubyGems (remitmd 0.4.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
      - name: Publish deprecation version
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        working-directory: ruby
        run: |
          # Update version to 0.4.1
          sed -i 's/VERSION = "0.4.0"/VERSION = "0.4.1"/' lib/remitmd.rb
          gem build remitmd.gemspec
          gem push remitmd-0.4.1.gem 2>&1 || echo "Push failed (may already exist)"

  deprecate-nuget:
    name: Publish deprecation to NuGet (Remit 0.4.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Publish deprecation version
        working-directory: dotnet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          # Update version to 0.4.1
          sed -i 's/<Version>0.4.0</<Version>0.4.1</' RemitMd/RemitMd.csproj
          dotnet pack RemitMd/RemitMd.csproj -c Release -o ./nupkg
          dotnet nuget push ./nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" 2>&1 || echo "Push failed (may already exist)"

  deprecate-hex:
    name: Retire Hex.pm (remit) — already done
    runs-on: ubuntu-latest
    steps:
      - name: Retire all versions
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          VERSIONS=$(curl -s https://hex.pm/api/packages/remit | jq -r '.releases[].version')
          for v in $VERSIONS; do
            echo "Retiring remit@$v..."
            curl -s -X POST "https://hex.pm/api/packages/remit/releases/$v/retire" \
              -H "Authorization: $HEX_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"reason":"renamed","message":"DEPRECATED: Use pay-cli (cargo install pay-cli) or pay-sdk (pip install pay-sdk). See https://pay-skill.com/docs"}' \
              2>&1 || echo "  (already retired or error)"
          done
