name: PR Hygiene

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  hygiene:
    uses: remit-md/.github/.github/workflows/pr-hygiene.yml@main
    with:
      preset: polyglot-sdk
      scan_paths: python/src/ typescript/src/ go/ rust/src/ java/src/ ruby/lib/ swift/Sources/ elixir/lib/ dotnet/RemitMd/
