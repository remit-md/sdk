name: PR Hygiene

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hygiene issues
        id: scan
        run: |
          REPORT=""
          ISSUES=0

          # ============================================================
          # Rust SDK — todo!(), unimplemented!(), stub patterns
          # ============================================================
          RUST_STUBS=$(grep -rn 'todo!()\|unimplemented!()\|STUB\|FIXME\|HACK' --include='*.rs' rust/src/ 2>/dev/null || true)
          if [ -n "$RUST_STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Rust: stub / TODO patterns\n\`\`\`\n${RUST_STUBS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # Python SDK — TODO, stub, pass-only functions
          # ============================================================
          PY_STUBS=$(grep -rn 'TODO\|FIXME\|HACK\|NotImplementedError\|raise NotImplemented' --include='*.py' python/src/ 2>/dev/null || true)
          if [ -n "$PY_STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Python: stub / TODO patterns\n\`\`\`\n${PY_STUBS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # TypeScript SDK — TODO, stub patterns
          # ============================================================
          TS_STUBS=$(grep -rn 'TODO\|FIXME\|HACK\|throw new Error.*not implemented' --include='*.ts' typescript/src/ 2>/dev/null || true)
          if [ -n "$TS_STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### TypeScript: stub / TODO patterns\n\`\`\`\n${TS_STUBS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # Go SDK — TODO, stub patterns
          # ============================================================
          GO_STUBS=$(grep -rn 'TODO\|FIXME\|HACK\|panic("not implemented")' --include='*.go' go/ \
            | grep -v '_test\.go\|vendor/' 2>/dev/null || true)
          if [ -n "$GO_STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Go: stub / TODO patterns\n\`\`\`\n${GO_STUBS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # Java SDK — TODO, stub patterns
          # ============================================================
          JAVA_STUBS=$(grep -rn 'TODO\|FIXME\|HACK\|throw new UnsupportedOperationException' --include='*.java' --include='*.kt' java/src/ 2>/dev/null || true)
          if [ -n "$JAVA_STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Java/Kotlin: stub / TODO patterns\n\`\`\`\n${JAVA_STUBS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # Ruby SDK — TODO, stub patterns
          # ============================================================
          RUBY_STUBS=$(grep -rn 'TODO\|FIXME\|HACK\|raise NotImplementedError' --include='*.rb' ruby/lib/ 2>/dev/null || true)
          if [ -n "$RUBY_STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Ruby: stub / TODO patterns\n\`\`\`\n${RUBY_STUBS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # Swift SDK — TODO, stub patterns
          # ============================================================
          SWIFT_STUBS=$(grep -rn 'TODO\|FIXME\|HACK\|fatalError.*not implemented' --include='*.swift' swift/Sources/ 2>/dev/null || true)
          if [ -n "$SWIFT_STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Swift: stub / TODO patterns\n\`\`\`\n${SWIFT_STUBS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # Elixir SDK — TODO, stub patterns
          # ============================================================
          EX_STUBS=$(grep -rn 'TODO\|FIXME\|HACK\|raise "not implemented"' --include='*.ex' --include='*.exs' elixir/lib/ 2>/dev/null || true)
          if [ -n "$EX_STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Elixir: stub / TODO patterns\n\`\`\`\n${EX_STUBS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # .NET SDK — TODO, stub patterns
          # ============================================================
          DOTNET_STUBS=$(grep -rn 'TODO\|FIXME\|HACK\|throw new NotImplementedException\|NotSupportedException' --include='*.cs' dotnet/RemitMd/  2>/dev/null || true)
          if [ -n "$DOTNET_STUBS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### .NET: stub / TODO patterns\n\`\`\`\n${DOTNET_STUBS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # Cross-SDK: hardcoded addresses in production code
          # ============================================================
          HARDCODED=$(grep -rn '0x[0-9a-fA-F]\{40,\}' \
            --include='*.rs' --include='*.py' --include='*.ts' --include='*.go' \
            --include='*.java' --include='*.kt' --include='*.rb' --include='*.swift' \
            --include='*.ex' --include='*.cs' \
            python/src/ typescript/src/ go/ rust/src/ java/src/ ruby/lib/ swift/Sources/ elixir/lib/ dotnet/RemitMd/ \
            2>/dev/null \
            | grep -v 'test\|Test\|spec\|mock\|fixture\|vendor' || true)
          if [ -n "$HARDCODED" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Cross-SDK: possible hardcoded addresses in production code\n\`\`\`\n${HARDCODED}\n\`\`\`\n\n"
          fi

          # ============================================================
          # Cross-SDK: hardcoded secrets
          # ============================================================
          SECRETS=$(grep -rn 'PRIVATE_KEY\s*=\s*["'"'"'][0-9a-fA-Fx]\{10,\}["'"'"']\|sk_live\|pk_live' \
            --include='*.rs' --include='*.py' --include='*.ts' --include='*.go' \
            --include='*.java' --include='*.kt' --include='*.rb' --include='*.swift' \
            --include='*.ex' --include='*.cs' \
            python/src/ typescript/src/ go/ rust/src/ java/src/ ruby/lib/ swift/Sources/ elixir/lib/ dotnet/RemitMd/ \
            2>/dev/null \
            | grep -v 'env\|ENV\|config\|test\|Test\|spec\|mock\|fixture' || true)
          if [ -n "$SECRETS" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Cross-SDK: possible hardcoded secrets\n\`\`\`\n${SECRETS}\n\`\`\`\n\n"
          fi

          # ============================================================
          # Cross-SDK: test files with no assertions
          # ============================================================
          NO_ASSERT=""
          # Python tests
          for f in $(find python/tests -name 'test_*.py' 2>/dev/null); do
            if ! grep -qE 'assert |assertEqual|assertTrue|assertFalse|assertRaises|pytest\.raises' "$f"; then
              NO_ASSERT="${NO_ASSERT}${f}\n"
            fi
          done
          # TypeScript tests
          for f in $(find typescript/tests -name '*.ts' 2>/dev/null); do
            if ! grep -qE 'assert\.|strictEqual|deepEqual|throws|ok\(' "$f"; then
              NO_ASSERT="${NO_ASSERT}${f}\n"
            fi
          done
          # Go tests
          for f in $(find go -name '*_test.go' 2>/dev/null); do
            if ! grep -qE 't\.Error\|t\.Fatal\|t\.Fail\|assert\.\|require\.' "$f"; then
              NO_ASSERT="${NO_ASSERT}${f}\n"
            fi
          done
          if [ -n "$NO_ASSERT" ]; then
            ISSUES=$((ISSUES + 1))
            REPORT="${REPORT}### Test files with no assertions\n\`\`\`\n${NO_ASSERT}\`\`\`\n\n"
          fi

          if [ "$ISSUES" -eq 0 ]; then
            echo "body=**PR Hygiene Check** :white_check_mark: — No issues found." >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<HYGIENE_EOF'
              echo -e "**PR Hygiene Check** :warning: — Found ${ISSUES} category(s) of issues (advisory only)\n\n${REPORT}"
              echo 'HYGIENE_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.scan.outputs.body }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR Hygiene Check')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
