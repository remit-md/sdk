name: Publish SDKs

# CHECKLIST before running:
# 1. Server deployed to production and healthy
# 2. All acceptance tests pass against production
# 3. VERSION bumped appropriately
# 4. CHANGELOG updated
on:
  workflow_dispatch:
    inputs:
      skip_bump:
        description: 'Publish current VERSION without bumping (for first release)'
        type: boolean
        default: false

concurrency:
  group: publish
  cancel-in-progress: false  # Never cancel a publish in progress

permissions:
  contents: read

jobs:
  bump-and-tag:
    name: Bump version & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          if [ "${{ inputs.skip_bump }}" = "true" ]; then
            VERSION="$CURRENT"
          else
            IFS='.' read -r major minor patch <<< "$CURRENT"
            patch=$((patch + 1))
            VERSION="${major}.${minor}.${patch}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Update VERSION file
        if: inputs.skip_bump != true
        run: echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Update all SDK version declarations
        if: inputs.skip_bump != true
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Python
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" python/pyproject.toml

          # TypeScript
          cd typescript && npm version "$VERSION" --no-git-tag-version && cd ..

          # Rust
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$VERSION\"/}" rust/Cargo.toml

          # .NET
          sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|" dotnet/RemitMd/RemitMd.csproj

          # Java
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" java/build.gradle.kts

          # Ruby
          sed -i "s/VERSION = \".*\"/VERSION = \"$VERSION\"/" ruby/lib/remitmd.rb

          # Elixir
          sed -i "s/version: \".*\"/version: \"$VERSION\"/" elixir/mix.exs

      - name: Validate version consistency
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Validating version $VERSION across all SDKs..."
          FAIL=0
          grep -q "version = \"$VERSION\"" python/pyproject.toml         || { echo "FAIL: Python"; FAIL=1; }
          grep -q "\"version\": \"$VERSION\"" typescript/package.json     || { echo "FAIL: TypeScript"; FAIL=1; }
          grep -q "version = \"$VERSION\"" rust/Cargo.toml               || { echo "FAIL: Rust"; FAIL=1; }
          grep -q "<Version>$VERSION</Version>" dotnet/RemitMd/RemitMd.csproj || { echo "FAIL: .NET"; FAIL=1; }
          grep -q "version = \"$VERSION\"" java/build.gradle.kts         || { echo "FAIL: Java"; FAIL=1; }
          grep -q "VERSION = \"$VERSION\"" ruby/lib/remitmd.rb           || { echo "FAIL: Ruby"; FAIL=1; }
          grep -q "version: \"$VERSION\"" elixir/mix.exs                 || { echo "FAIL: Elixir"; FAIL=1; }
          [ $FAIL -eq 0 ] && echo "All SDKs at version $VERSION"
          exit $FAIL

      - name: Commit, tag, and push
        if: inputs.skip_bump != true
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git add -A
          git commit -m "release: v$VERSION"
          git tag "$TAG"
          git tag "go/$TAG"
          git push origin main "$TAG" "go/$TAG"

      - name: Tag only (first release)
        if: inputs.skip_bump == true
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git tag "go/$TAG"
          git push origin "$TAG" "go/$TAG"

  test-gate:
    name: Test gate (all 9 SDKs)
    needs: [bump-and-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Python tests
        run: cd python && pip install -e ".[dev]" && pytest -v --ignore=tests/acceptance --ignore=tests/compliance

      - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          version: 'latest'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: TypeScript tests
        run: cd typescript && pnpm install --frozen-lockfile && pnpm tsc --noEmit && pnpm tsc && node --import ./node_modules/tsx/dist/esm/index.cjs --test tests/*.ts

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum
      - name: Go tests
        run: cd go && go mod tidy && go test ./...

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust
      - name: Rust tests
        run: cd rust && cargo test

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0'
      - name: .NET tests
        run: cd dotnet && dotnet test

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Java tests
        run: cd java && gradle test

      - uses: ruby/setup-ruby@32110d4e311bd8996b2a82bf2a43b714ccc91777 # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ruby
      - name: Ruby tests
        run: cd ruby && bundle exec rspec

      - name: Swift tests
        run: cd swift && swift test

      - uses: erlef/setup-beam@0a75ccf1c18916f948584bdc83392d72e26f58f7 # v1
        with:
          elixir-version: '1.17'
          otp-version: '27'
      - name: Elixir tests
        run: cd elixir && mix deps.get && mix test

  python:
    name: Python -> PyPI
    needs: [bump-and-tag, test-gate]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: cd python && python -m build
      - uses: pypa/gh-action-pypi-publish@7f25271a4aa483500f742f9492b2ab5648d61011 # release/v1
        with:
          packages-dir: python/dist/

  typescript:
    name: TypeScript -> npm
    needs: [bump-and-tag, test-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          version: 'latest'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: cd typescript && pnpm install --frozen-lockfile && pnpm tsc
      - run: cd typescript && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  rust:
    name: Rust -> crates.io
    needs: [bump-and-tag, test-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - run: cd rust && cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  dotnet:
    name: .NET -> NuGet
    needs: [bump-and-tag, test-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.x'
      - run: cd dotnet && dotnet pack RemitMd/RemitMd.csproj -c Release
      - run: dotnet nuget push dotnet/RemitMd/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

  java:
    name: Java -> Maven Central
    needs: [bump-and-tag, test-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Decode GPG key and publish to local repo
        working-directory: java
        run: |
          export GPG_PRIVATE_KEY_DECODED=$(echo "$GPG_PRIVATE_KEY_B64" | base64 -d)
          gradle publishToMavenLocal
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      - name: Bundle and upload to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          cd ~/.m2/repository/md/remit/remit-sdk/$VERSION
          jar -cvf bundle.jar *
          TOKEN=$(echo -n "$MAVEN_CENTRAL_USERNAME:$MAVEN_CENTRAL_PASSWORD" | base64)
          curl -s -w "\n%{http_code}" \
            -X POST "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC" \
            -H "Authorization: Bearer $TOKEN" \
            -F "bundle=@bundle.jar;type=application/java-archive" \
            | tee /tmp/upload_response.txt
          HTTP_CODE=$(tail -1 /tmp/upload_response.txt)
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "Upload failed with HTTP $HTTP_CODE"
            cat /tmp/upload_response.txt
            exit 1
          fi
          echo "Upload successful!"

  ruby:
    name: Ruby -> RubyGems
    needs: [bump-and-tag, test-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - uses: ruby/setup-ruby@32110d4e311bd8996b2a82bf2a43b714ccc91777 # v1
        with:
          ruby-version: '3.2'
      - name: Build and push gem
        working-directory: ruby
        run: |
          mkdir -p ~/.gem
          echo ":rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          gem build remitmd.gemspec
          gem push remitmd-*.gem

  elixir:
    name: Elixir -> Hex.pm
    needs: [bump-and-tag, test-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - uses: erlef/setup-beam@0a75ccf1c18916f948584bdc83392d72e26f58f7 # v1
        with:
          elixir-version: '1.17'
          otp-version: '27'
      - name: Publish to Hex.pm
        working-directory: elixir
        run: |
          mix local.hex --force
          mix deps.get
          mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  go:
    name: Go -> Go Proxy
    needs: [bump-and-tag, test-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'
      - name: Warm Go module proxy
        env:
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
        run: GOPROXY=https://proxy.golang.org go list -m "github.com/remit-md/sdk/go@$TAG"

  swift:
    name: Swift (tag-based)
    needs: [bump-and-tag, test-gate]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Swift packages are distributed via git tags. The ${{ needs.bump-and-tag.outputs.tag }} tag is sufficient."

  github-release:
    name: Create GitHub Release
    needs: [bump-and-tag, python, typescript, rust, dotnet, java, ruby, elixir, go, swift]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.bump-and-tag.outputs.tag }}
          VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "v$VERSION" \
            --generate-notes
